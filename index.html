<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>オーディオアニメーション</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', 'Meiryo', sans-serif;
            min-height: 100vh;
            overflow: hidden;
            background-color: rgb(0, 255, 0);
        }

        .control-panel {
            position: fixed;
            top: 12px;
            left: 12px;
            z-index: 100;
            display: flex;
            flex-wrap: wrap;
            align-items: flex-start;
            gap: 0;
            max-width: calc(100vw - 24px);
            padding: 10px 12px;
            background: rgba(40, 40, 40, 0.85);
            border-radius: 6px;
            color: #fff;
            font-size: 12px;
            user-select: none;
        }

        .control-group {
            display: flex;
            flex-direction: column;
            gap: 4px;
            min-width: 148px;
            padding: 0 12px;
        }

        .control-group:first-child {
            padding-left: 0;
        }

        .control-group:last-child {
            padding-right: 0;
        }

        .control-divider {
            width: 1px;
            align-self: stretch;
            background: rgba(255, 255, 255, 0.2);
            margin: 2px 0;
        }

        .control-header {
            display: flex;
            align-items: baseline;
            justify-content: space-between;
            gap: 8px;
        }

        .control-header label,
        .control-label {
            font-size: 12px;
            font-weight: 600;
            white-space: nowrap;
        }

        .control-value {
            min-width: 44px;
            text-align: right;
            font-variant-numeric: tabular-nums;
            color: #cce8ff;
            font-size: 11px;
        }

        .control-panel input[type="range"] {
            width: 100%;
            cursor: pointer;
        }

        .control-hint {
            font-size: 10px;
            line-height: 1.35;
            color: rgba(255, 255, 255, 0.65);
        }

        .control-hint strong {
            color: rgba(255, 255, 255, 0.85);
            font-weight: 600;
        }

        .control-group--meter .control-value {
            font-size: 12px;
        }

        .main-container {
            display: flex;
            width: 100vw;
            height: 100vh;
        }

        .avatar-side {
            position: relative;
            flex: 1;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        .animation-image {
            position: absolute;
            width: 320px;
            height: 320px;
            image-rendering: pixelated;
            image-rendering: -moz-crisp-edges;
            image-rendering: crisp-edges;
            opacity: 0;
            transition: none;
        }

        .animation-image.active {
            opacity: 1;
        }

        .error-message {
            position: fixed;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            color: #ff0000;
            text-align: center;
            padding: 20px;
            background: rgba(0, 0, 0, 0.5);
            border-radius: 10px;
            display: none;
            z-index: 200;
        }

        .error-message.show {
            display: block;
        }
    </style>
</head>
<body>
    <div class="control-panel">
        <div class="control-group">
            <div class="control-header">
                <label for="bgOpacity" title="グリーンバック背景をどれだけ透かすか。合成時は0%推奨">背景透過度</label>
                <span class="control-value" id="bgOpacityValue">0%</span>
            </div>
            <input type="range" id="bgOpacity" min="0" max="100" value="0">
            <p class="control-hint">左がグリーンバック（#00FF00）。右ほど透明になります</p>
        </div>

        <div class="control-divider"></div>

        <div class="control-group">
            <div class="control-header">
                <label for="micSensitivity" title="この音量以上で口パクを開始します">開始感度</label>
                <span class="control-value" id="micSensitivityValue">-50 dB</span>
            </div>
            <input type="range" id="micSensitivity" min="0" max="100" value="50">
            <p class="control-hint">右ほど<strong>小さい声</strong>でも反応します</p>
        </div>

        <div class="control-divider"></div>

        <div class="control-group">
            <div class="control-header">
                <label for="hysteresisGap" title="開始と停止の閾値差。大きいほど境目でのチラつきを防ぎます">切り替え幅</label>
                <span class="control-value" id="hysteresisGapValue">5 dB</span>
            </div>
            <input type="range" id="hysteresisGap" min="3" max="15" value="5">
            <p class="control-hint">開始・停止の差。大きいほど<strong>安定</strong>します</p>
        </div>

        <div class="control-divider"></div>

        <div class="control-group">
            <div class="control-header">
                <label for="silenceResetDelay" title="無音が続いてから1コマ目に戻るまでの待ち時間">無音リセット</label>
                <span class="control-value" id="silenceResetDelayValue">120 ms</span>
            </div>
            <input type="range" id="silenceResetDelay" min="50" max="300" step="10" value="120">
            <p class="control-hint">無音後、1コマ目へ戻るまでの<strong>待ち時間</strong></p>
        </div>

        <div class="control-divider"></div>

        <div class="control-group control-group--meter">
            <div class="control-header">
                <span class="control-label" title="現在のマイク入力レベル（調整の目安）">入力レベル</span>
                <span class="control-value" id="inputLevelValue">— dB</span>
            </div>
            <p class="control-hint">
                開始 <strong id="thresholdOnDisplay">-50</strong> dB ／
                停止 <strong id="thresholdOffDisplay">-55</strong> dB
            </p>
        </div>
    </div>

    <div class="main-container">
        <div class="avatar-side avatar-left">
            <img src="img/p1.png" alt="P Frame 1" class="animation-image" id="imageP1">
            <img src="img/p2.png" alt="P Frame 2" class="animation-image" id="imageP2">
        </div>
        <div class="avatar-side avatar-right">
            <img src="img/m1.png" alt="M Frame 1" class="animation-image" id="imageM1">
            <img src="img/m2.png" alt="M Frame 2" class="animation-image" id="imageM2">
        </div>
    </div>

    <div class="error-message" id="errorMessage">
        マイクへのアクセスが拒否されました
    </div>

    <script>
        let audioContext;
        let analyser;
        let microphone;
        let timeDataArray;
        let animationFrameId;
        let currentFrame = 0;
        let lastFrameTime = 0;
        let silenceStartTime = null;
        let frameInterval = 100;
        let silenceResetDelay = 120;

        const MIN_DB = -60;
        const SENSITIVITY_MIN_DB = -65;
        const SENSITIVITY_MAX_DB = -35;
        let thresholdOnDb = -50;
        let thresholdOffDb = -55;
        let isAnimating = false;

        const imagePairs = [
            [document.getElementById('imageP1'), document.getElementById('imageP2')],
            [document.getElementById('imageM1'), document.getElementById('imageM2')]
        ];

        const bgOpacitySlider = document.getElementById('bgOpacity');
        const bgOpacityValue = document.getElementById('bgOpacityValue');
        const micSensitivitySlider = document.getElementById('micSensitivity');
        const micSensitivityValue = document.getElementById('micSensitivityValue');
        const hysteresisGapSlider = document.getElementById('hysteresisGap');
        const hysteresisGapValue = document.getElementById('hysteresisGapValue');
        const silenceResetDelaySlider = document.getElementById('silenceResetDelay');
        const silenceResetDelayValue = document.getElementById('silenceResetDelayValue');
        const inputLevelValue = document.getElementById('inputLevelValue');
        const thresholdOnDisplay = document.getElementById('thresholdOnDisplay');
        const thresholdOffDisplay = document.getElementById('thresholdOffDisplay');

        function sliderToOnDb(sliderValue) {
            const ratio = Number(sliderValue) / 100;
            return SENSITIVITY_MAX_DB - ratio * (SENSITIVITY_MAX_DB - SENSITIVITY_MIN_DB);
        }

        function updateThresholds() {
            thresholdOnDb = sliderToOnDb(micSensitivitySlider.value);
            thresholdOffDb = thresholdOnDb - Number(hysteresisGapSlider.value);

            micSensitivityValue.textContent = `${thresholdOnDb.toFixed(0)} dB`;
            hysteresisGapValue.textContent = `${hysteresisGapSlider.value} dB`;
            thresholdOnDisplay.textContent = thresholdOnDb.toFixed(0);
            thresholdOffDisplay.textContent = thresholdOffDb.toFixed(0);
        }

        function updateSilenceResetDelay() {
            silenceResetDelay = Number(silenceResetDelaySlider.value);
            silenceResetDelayValue.textContent = `${silenceResetDelay} ms`;
        }

        function updateBackgroundOpacity() {
            const transparency = Number(bgOpacitySlider.value);
            const alpha = 1 - transparency / 100;
            document.body.style.backgroundColor = `rgba(0, 255, 0, ${alpha})`;
            bgOpacityValue.textContent = `${transparency}%`;
        }

        bgOpacitySlider.addEventListener('input', updateBackgroundOpacity);
        micSensitivitySlider.addEventListener('input', updateThresholds);
        hysteresisGapSlider.addEventListener('input', updateThresholds);
        silenceResetDelaySlider.addEventListener('input', updateSilenceResetDelay);
        updateBackgroundOpacity();
        updateThresholds();
        updateSilenceResetDelay();

        function setPairFrame(pair, frameIndex) {
            const [image1, image2] = pair;
            const isImage1Active = image1.classList.contains('active');
            const isImage2Active = image2.classList.contains('active');

            if ((frameIndex === 0 && isImage1Active) || (frameIndex === 1 && isImage2Active)) {
                return;
            }

            if (frameIndex === 0) {
                image1.classList.add('active');
                if (isImage2Active) {
                    image2.classList.remove('active');
                }
            } else {
                image2.classList.add('active');
                if (isImage1Active) {
                    image1.classList.remove('active');
                }
            }
        }

        function showFrame(frameIndex) {
            imagePairs.forEach(pair => setPairFrame(pair, frameIndex));
        }

        function showStaticFrame() {
            imagePairs.forEach(pair => setPairFrame(pair, 0));
        }

        async function initAudio() {
            try {
                const stream = await navigator.mediaDevices.getUserMedia({
                    audio: {
                        echoCancellation: false,
                        noiseSuppression: false,
                        autoGainControl: false
                    }
                });

                audioContext = new (window.AudioContext || window.webkitAudioContext)();
                analyser = audioContext.createAnalyser();
                microphone = audioContext.createMediaStreamSource(stream);

                analyser.fftSize = 2048;
                analyser.smoothingTimeConstant = 0.3;
                timeDataArray = new Float32Array(analyser.fftSize);

                microphone.connect(analyser);

                document.getElementById('errorMessage').classList.remove('show');

                showStaticFrame();
                animate();

            } catch (error) {
                console.error('マイクへのアクセスエラー:', error);
                document.getElementById('errorMessage').classList.add('show');
            }
        }

        function animate() {
            if (!analyser) return;

            analyser.getFloatTimeDomainData(timeDataArray);

            let sum = 0;
            for (let i = 0; i < timeDataArray.length; i++) {
                const sample = timeDataArray[i];
                sum += sample * sample;
            }

            const rms = Math.sqrt(sum / timeDataArray.length);
            const rmsDb = rms > 0 ? 20 * Math.log10(rms) : MIN_DB;
            inputLevelValue.textContent = `${rmsDb.toFixed(0)} dB`;

            const now = Date.now();

            if (rmsDb >= thresholdOnDb) {
                silenceStartTime = null;

                if (!isAnimating) {
                    isAnimating = true;
                    lastFrameTime = now;
                }

                if (now - lastFrameTime >= frameInterval) {
                    currentFrame = (currentFrame + 1) % 2;
                    showFrame(currentFrame);
                    lastFrameTime = now;
                }
            } else if (rmsDb < thresholdOffDb) {
                if (isAnimating) {
                    isAnimating = false;
                    silenceStartTime = now;
                } else if (
                    silenceStartTime !== null &&
                    now - silenceStartTime >= silenceResetDelay &&
                    currentFrame !== 0
                ) {
                    currentFrame = 0;
                    showStaticFrame();
                    silenceStartTime = null;
                }
            } else if (isAnimating) {
                if (now - lastFrameTime >= frameInterval) {
                    currentFrame = (currentFrame + 1) % 2;
                    showFrame(currentFrame);
                    lastFrameTime = now;
                }
            }

            animationFrameId = requestAnimationFrame(animate);
        }

        window.addEventListener('load', initAudio);

        window.addEventListener('beforeunload', () => {
            if (animationFrameId) {
                cancelAnimationFrame(animationFrameId);
            }
            if (audioContext) {
                audioContext.close();
            }
        });
    </script>
</body>
</html>
